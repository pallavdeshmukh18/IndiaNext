version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: indianext-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: IndiaNext
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - indianext-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indianext-backend
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      MONGO_URI: mongodb://admin:password@mongodb:27017/IndiaNext?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
      HF_API_TOKEN: ${HF_API_TOKEN}
      HF_INFERENCE_MODE: ${HF_INFERENCE_MODE:-api}
      HF_API_BASE_URL: https://router.huggingface.co/hf-inference/models
      PYTHON_BIN: python3
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./ML:/app/ML
    networks:
      - indianext-network
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: indianext-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - indianext-network
    command: npm run dev

networks:
  indianext-network:
    driver: bridge

volumes:
  mongodb_data:
