<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndiaNext Threat Lens</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Threat Lens</h1>
        <p>OCR the current screen, inspect the page DOM, and flag phishing patterns live.</p>
      </header>

      <label class="field-label" for="backendUrl">Backend URL</label>
      <input id="backendUrl" class="input" type="url" value="http://localhost:8000" />

      <button id="analyzeBtn" class="btn-primary">Scan Current Screen</button>

      <label class="toggle-row" for="liveModeToggle">
        <input id="liveModeToggle" type="checkbox" />
        <span>Live monitor (every 8s)</span>
      </label>

      <p id="statusText" class="status-text">Ready to analyze.</p>
      <p id="lastAnalyzed" class="meta-text hidden"></p>

      <section id="previewCard" class="preview-card hidden" aria-live="polite">
        <img id="screenshotPreview" alt="Captured screenshot" />
      </section>

      <section id="resultCard" class="result-card hidden" aria-live="polite">
        <div class="result-top">
          <div>
            <p class="result-label">Risk Score</p>
            <p id="riskScore" class="risk-score">0%</p>
          </div>
          <span id="riskBadge" class="risk-badge">SAFE</span>
        </div>

        <div class="meter-wrap">
          <div class="meter-bg">
            <div id="meterFill" class="meter-fill"></div>
          </div>
        </div>

        <div class="result-block">
          <p class="result-label">Threat Type</p>
          <p id="threatType" class="result-text">None</p>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <p class="result-label">Detected Brand</p>
            <p id="detectedBrand" class="result-text">None</p>
          </div>
          <div class="detail-card">
            <p class="result-label">Actual Domain</p>
            <p id="actualDomain" class="result-text">Unknown</p>
          </div>
        </div>

        <div class="result-block">
          <p class="result-label">Why</p>
          <p id="explanation" class="result-text"></p>
        </div>

        <div class="result-block">
          <p class="result-label">Evidence</p>
          <ul id="evidenceList" class="evidence-list"></ul>
        </div>

        <div class="result-block">
          <p class="result-label">OCR Excerpt</p>
          <p id="ocrText" class="result-text result-mono">No screenshot OCR yet.</p>
        </div>

        <div class="result-block">
          <p class="result-label">Recommendation</p>
          <p id="recommendation" class="result-text"></p>
        </div>
      </section>

      <p id="errorText" class="error-text hidden"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
